@if (loading) {
  <div class="loading-overlay">
    <mat-spinner diameter="56" />
    <p>Cargando...</p>
  </div>
} @else {
  <h1 class="page-title">Pendientes por votar</h1>

  <mat-card class="table-card">
    <mat-card-content>
      @if (pendingVoters.length === 0) {
        <div class="empty-state">
          <mat-icon class="empty-icon">how_to_vote</mat-icon>
          <p>¡Todos han votado!</p>
        </div>
      } @else {
        <p class="count-label">{{ pendingVoters.length }} votante(s) pendiente(s)</p>
        <table mat-table [dataSource]="pendingVoters" class="pending-table">

          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nombre</th>
            <td mat-cell *matCellDef="let voter">{{ voter.name }}</td>
          </ng-container>

          <ng-container matColumnDef="location">
            <th mat-header-cell *matHeaderCellDef>Sede</th>
            <td mat-cell *matCellDef="let voter">{{ voter.location || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="course">
            <th mat-header-cell *matHeaderCellDef>Curso</th>
            <td mat-cell *matCellDef="let voter">{{ voter.course || '—' }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      }
    </mat-card-content>
  </mat-card>
}
