<div class="success-container">
  <mat-card class="success-card">
    <mat-card-content>
      <div class="icon-wrapper">
        <mat-icon class="success-icon">check_circle</mat-icon>
      </div>
      <h1 class="success-title">¡Voto Registrado!</h1>
      <p class="success-subtitle">¡Gracias por participar!</p>
      <p class="success-message">Tu voto ha sido registrado exitosamente en el sistema.</p>
      <button mat-raised-button color="primary" (click)="goToLogin()">
        Volver al inicio
      </button>
    </mat-card-content>
  </mat-card>
</div>
